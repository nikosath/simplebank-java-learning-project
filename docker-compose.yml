services:
  postgres:
    image: postgres:16-alpine
    container_name: simplebank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: simplebank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - simplebank_postgres_data:/var/lib/postgresql/data
      - ./simplebank/sql/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro

volumes:
  simplebank_postgres_data:
